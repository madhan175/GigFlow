version: '3.8'

services:
  database:
    image: mongo:6
    container_name: smart-leads-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: smart-leads-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://database:27017/smart-leads
      - JWT_SECRET=smart_leads_dashboard_super_secret_key_123!
      - JWT_EXPIRES_IN=7d
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: smart-leads-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
